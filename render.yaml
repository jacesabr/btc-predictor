databases:
  - name: btc-predictor-pg
    plan: starter        # free tier expires after 90 days — starter is persistent
    postgresMajorVersion: "17"     # Render's max as of 2026; Railway was on 18 — safe downgrade for this schema

services:
  - type: web
    name: btc-predictor
    runtime: python
    plan: starter        # free tier sleeps; 5-min bar loop needs 24/7 uptime
    region: oregon       # match the DB region to avoid cross-region latency
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --loop asyncio
    healthCheckPath: /price
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: btc-predictor-pg
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
      # Secrets — set these in the Render dashboard, not committed:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: COINALYZE_KEY
        sync: false
      - key: COINGLASS_KEY
        sync: false
      - key: VENICE_API_KEY
        sync: false
